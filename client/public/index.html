<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#050816" />
    <meta
      name="description"
      content="ShopEZ — The future of premium online shopping"
    />

    <!-- Preconnect for Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <title>ShopEZ — Premium Shopping Experience</title>

    <style>
      /* Initial loading state */
      #root:empty::before {
        content: "";
        display: block;
        position: fixed;
        inset: 0;
        background: #050816;
        z-index: 9999;
      }

      body {
        margin: 0;
        background: #050816;
        overflow-x: hidden;
      }
    </style>
  </head>
  <body>
    <noscript>
      You need to enable JavaScript to run ShopEZ.
    </noscript>
    <div id="root"></div>
  </body>
</html>
